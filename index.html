<!DOCTYPE html>
<html>
<head>
    <title>Praktikum 10 - Animasi & Interaktivitas</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
</head>
<body>

NAMA : Novita Rahayu <br>
NPM : 2513025036 <br><br>

<button onclick="balok.position.x -= 0.5">Geser Kiri</button>
<button onclick="balok.position.x += 0.5">Geser Kanan</button>
<button onclick="balok.position.y += 0.5">Geser Atas</button>
<button onclick="balok.position.y -= 0.5">Geser Bawah</button>
<button onclick="balok.material.color.setHex(Math.random()*0xffffff)">
    Ubah Warna
</button>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 7;
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const geometry = new THREE.BoxGeometry(2, 1, 1);
const material = new THREE.MeshBasicMaterial({
    color: 0x00aaff
});
const balok = new THREE.Mesh(geometry, material);
scene.add(balok);
function animate() {
    requestAnimationFrame(animate);
    balok.rotation.y += 0.02;
    renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
